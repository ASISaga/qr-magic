<script>
  function verifySession() {
    const urlParams = new URLSearchParams(window.location.search);
    const urlAuth = urlParams.get('auth');
    const storedAuth = sessionStorage.getItem('valid_session');

    // SECURITY CHECK: 
    // Does the URL token match the Session Storage token?
    if (!urlAuth || urlAuth !== storedAuth) {
      document.body.innerHTML = "<h1>Access Denied</h1><p>You must scan the QR code to view this page.</p>";
      // Optional: Redirect them away
      // window.location.href = "../index.html";
      return;
    }

    // If it matches, clear the URL so they can't copy-paste the link to a friend
    window.history.replaceState({}, document.title, window.location.pathname);
    
    // Now show the "Secret" content
    document.getElementById('content').style.display = 'block';
  }
  window.onload = verifySession;
</script>

<div id="content" style="display:none;">
  <h1>Welcome!</h1>
  <p>This content is only visible for this single session.</p>
</div>
