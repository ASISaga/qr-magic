<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BBLW Experience</title>
    <style>
        body { font-family: sans-serif; display: none; padding: 20px; text-align: center; }
        .content { max-width: 500px; margin: 50px auto; border: 1px solid #eee; padding: 20px; border-radius: 10px; }
    </style>
</head>
<body id="page-body">
    <div class="content">
        <h1>Welcome.</h1>
        <p>This page was unlocked via QR scan.</p>
        <p>Closing this tab will end your session.</p>
    </div>

    <script>
        (function() {
            const params = new URLSearchParams(window.location.search);
            const urlKey = params.get('key');
            const storedKey = sessionStorage.getItem('qr_handshake');

            // VALIDATION: Does the URL key match the browser's session key?
            if (!urlKey || urlKey !== storedKey) {
                window.location.href = "../expired.html";
                return;
            }

            // CLEANUP: Remove the key from the address bar so they can't share the link
            window.history.replaceState({}, document.title, window.location.pathname);
            
            // SHOW CONTENT
            document.getElementById('page-body').style.display = 'block';
        })();
    </script>
</body>
</html>
