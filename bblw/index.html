<script>
  async function gatekeeper() {
    const res = await fetch('../tokens.json');
    const data = await res.json();

    if (data.bblw === "available") {
      // 1. Trigger the "Burn" via GitHub Action
      // This marks the token as 'used' so the QR never works again
      await fetch('https://api.github.com/repos/YOUR_USER/YOUR_REPO/dispatches', {
        method: 'POST',
        headers: { 'Authorization': 'Bearer YOUR_PAT' },
        body: JSON.stringify({ event_type: 'burn_token' })
      });

      // 2. Generate a Session Secret
      const sessionSecret = 'secret-' + Math.random().toString(36).substr(2, 9);
      
      // 3. Store it in Session Storage (This dies when the tab closes)
      sessionStorage.setItem('valid_session', sessionSecret);

      // 4. Redirect to the destination with the secret in the URL
      window.location.href = `../destination/?auth=${sessionSecret}`;
    } else {
      window.location.href = "../expired.html";
    }
  }
  gatekeeper();
</script>
