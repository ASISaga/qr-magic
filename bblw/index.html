<!DOCTYPE html>
<html>
<head><title>Redirecting...</title></head>
<body style="background: #000;">
    <script>
        (function() {
            // 1. Generate a one-time 'Passphrase' for this specific scan
            const handshake = 'bblw-' + Math.random().toString(36).substr(2, 9);
            
            // 2. Store it in Session Storage (Only exists in this tab)
            sessionStorage.setItem('qr_handshake', handshake);

            // 3. Move to the destination with the key in the URL
            window.location.href = "../destination/?key=" + handshake;
        })();
    </script>
</body>
</html>
